<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Merchant Ops Console</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">Merchant Ops Console</div>
  </nav>

  <main class="content">
    <div class="intro">
      <h1>Merchant Ops Console</h1>
      <p>Use this application surface to reproduce the demo problems without any built-in telemetry explorer.</p>
    </div>

    <div class="card-grid">
      <section class="card">
        <h2>Orders Dashboard</h2>
        <div class="form-row">
          <label>
            Merchant ID
            <select id="merchant-id">
              <option value="1">Merchant 1</option>
              <option value="5">Merchant 5</option>
              <option value="12">Merchant 12</option>
              <option value="25">Merchant 25</option>
              <option value="42">Merchant 42</option>
            </select>
          </label>
          <label>
            Days
            <select id="days-range">
              <option value="7">7 days</option>
              <option value="30" selected>30 days</option>
              <option value="90">90 days</option>
            </select>
          </label>
        </div>
        <button id="btn-load-dashboard" onclick="loadDashboard()">Load Dashboard</button>
        <div id="dashboard-result" class="result-area"></div>
      </section>

      <section class="card">
        <h2>Shipping Quote</h2>
        <div class="form-row">
          <label>
            Origin ZIP
            <input id="origin-zip" type="text" value="10001">
          </label>
          <label>
            Destination ZIP
            <input id="dest-zip" type="text" value="90210">
          </label>
          <label>
            Weight (kg)
            <input id="weight" type="number" value="5.0" step="0.5">
          </label>
        </div>
        <button id="btn-get-quote" onclick="getQuote()">Get Quote</button>
        <div id="quote-result" class="result-area"></div>
      </section>

      <section class="card">
        <h2>Staff Login</h2>
        <div class="form-row">
          <label>
            Username
            <input id="username" type="text" value="admin">
          </label>
          <label>
            Password
            <input id="password" type="password" value="admin123">
          </label>
        </div>
        <button id="btn-login" onclick="doLogin()">Login</button>
        <div id="login-result" class="result-area"></div>
      </section>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
